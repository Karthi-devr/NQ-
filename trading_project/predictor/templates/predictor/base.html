{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasdaq 100 Direction Predictor | XGBoost AI</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    
    <!-- Chart.js CDN for Visualizing Feature Importance -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">▲</span>
                <div class="logo-text">
                    <h1>NQ.XGBoost</h1>
                    <span class="logo-sub">Nasdaq 100 AI Predictor</span>
                </div>
            </div>
            <nav class="nav-links">
                <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.view_name == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{% url 'performance' %}" class="nav-link {% if request.resolver_match.view_name == 'performance' %}active{% endif %}">Model Diagnostics</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="app-footer">
        <div class="footer-container">
            <p>&copy; 2026 Nasdaq 100 Direction Predictor. Powered by XGBoost & Django.</p>
            <p class="footer-note">Disclaimer: Educational project. Not financial advice.</p>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
